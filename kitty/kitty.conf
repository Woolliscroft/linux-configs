# font
font_family JetBrainsMono Nerd Font Mono
font_size 13

# symbols
disable_ligatures no

# sound annoyances
enable_audio_bell no

# shell
shell zsh
shell_integration disabled

# url in terminal
url_style curly

# window
remember_window_size no
initial_window_width 640
initial_window_height 480
window_padding_width 15
confirm_os_window_close 0

# cursor
cursor_blink_interval 0
cursor_shape block

#background
background_opacity 0.80

# scrollbar
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0

# performance
sync_to_monitor no # V-Sync

# colours
foreground #979eab
background #282c34
cursor #cccccc
color0 #282c34
color1 #e06c75
color2 #98c379
color3 #e5c07b
color4 #61afef
color5 #be5046
color6 #56b6c2
color7 #979eab
color8 #393e48
color9 #d19a66
color10 #56b6c2
color11 #e5c07b
color12 #61afef
color13 #be5046
color14 #56b6c2
color15 #abb2bf
selection_foreground #282c34
selection_background #979eab














