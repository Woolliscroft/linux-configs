# font
font_family JetBrainsMono Nerd Font Mono
font_size 13

# symbols
disable_ligatures no

# sound annoyances
enable_audio_bell no

# shell
shell zsh
shell_integration disabled

# url in terminal
url_style curly

# window
remember_window_size no
initial_window_width 640
initial_window_height 480
window_padding_width 10
confirm_os_window_close 0

# cursor
cursor_blink_interval 0
cursor_shape block

# background
background_opacity 0.30

# scrollbar
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0

# performance
sync_to_monitor no

# colours — snowboard palette
foreground            #C8D8E4
background            #0C1520
cursor                #5C8FAA

selection_foreground  #0C1520
selection_background  #5C8FAA

# black
color0   #172437
color8   #253D52

# red — kept for errors
color1   #c47d6e
color9   #d4907f

# green — subtle, for diffs etc
color2   #7aa368
color10  #8ab878

# yellow
color3   #c9aa6a
color11  #d4b87a

# blue — primary frost accent
color4   #5C8FAA
color12  #7AAECF

# magenta — muted sky
color5   #7A9DB3
color13  #8DAFC4

# cyan — ice
color6   #6E8EA0
color14  #8DAFC4

# white — readable text
color7   #8DAFC4
color15  #C8D8E4
